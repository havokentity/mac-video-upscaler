name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Install Dawn Tint
        run: |
          mkdir -p "$RUNNER_TEMP/dawn"
          curl -L https://github.com/google/dawn/releases/download/v20260423.175430/Dawn-31e25af254ab572c77054edec4946d2244e184dd-macos-latest-Release.tar.gz -o "$RUNNER_TEMP/dawn/dawn.tar.gz"
          tar -xzf "$RUNNER_TEMP/dawn/dawn.tar.gz" -C "$RUNNER_TEMP/dawn"
          echo "$RUNNER_TEMP/dawn/Dawn-31e25af254ab572c77054edec4946d2244e184dd-macos-latest-Release/bin" >> "$GITHUB_PATH"

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: E2E smoke test
        run: pnpm test:e2e

      - name: Validate WGSL to MSL with Tint
        run: pnpm validate:wgsl

      - name: Build extension
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-video-upscaler-extension
          path: dist
          if-no-files-found: error
