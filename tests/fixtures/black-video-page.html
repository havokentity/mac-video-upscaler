<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Chrome Video Upscaler black-frame fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #10141b;
      }

      video {
        width: 320px;
        height: 180px;
        background: #000;
      }
    </style>
  </head>
  <body>
    <video id="sample-video" width="320" height="180" muted playsinline autoplay loop controls></video>
    <script>
      const source = document.createElement('canvas');
      source.width = 320;
      source.height = 180;
      const context = source.getContext('2d');
      const paint = () => {
        context.fillStyle = '#000';
        context.fillRect(0, 0, source.width, source.height);
        requestAnimationFrame(paint);
      };
      paint();

      const video = document.querySelector('#sample-video');
      video.srcObject = source.captureStream(30);
      void video.play();
    </script>
  </body>
</html>
