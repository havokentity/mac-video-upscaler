<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Chrome Video Upscaler low-res fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #10141b;
      }

      video {
        width: 640px;
        height: 360px;
        background: #000;
      }
    </style>
  </head>
  <body>
    <video id="sample-video" width="640" height="360" muted playsinline autoplay loop controls></video>
    <script>
      const source = document.createElement('canvas');
      source.width = 96;
      source.height = 54;
      const context = source.getContext('2d');

      const paint = () => {
        context.imageSmoothingEnabled = false;
        context.fillStyle = '#111827';
        context.fillRect(0, 0, source.width, source.height);

        context.fillStyle = '#f8fafc';
        context.fillRect(8, 8, 30, 7);
        context.fillRect(8, 18, 48, 5);
        context.fillRect(8, 27, 36, 5);

        context.fillStyle = '#06b6d4';
        context.fillRect(59, 7, 25, 25);
        context.fillStyle = '#f97316';
        context.fillRect(64, 12, 15, 15);

        context.strokeStyle = '#facc15';
        context.lineWidth = 2;
        context.beginPath();
        context.moveTo(7, 45);
        context.lineTo(28, 35);
        context.lineTo(49, 44);
        context.lineTo(69, 34);
        context.lineTo(88, 46);
        context.stroke();

        requestAnimationFrame(paint);
      };
      paint();

      const video = document.querySelector('#sample-video');
      video.srcObject = source.captureStream(30);
      void video.play();
    </script>
  </body>
</html>
