<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrome Video Upscaler Options</title>
  </head>
  <body>
    <main>
      <h1>Chrome Video Upscaler Options</h1>
      <section>
        <h2>Defaults</h2>
        <p id="summary" class="note"></p>
        <label class="checkbox">
          <input id="hudEnabled" type="checkbox" />
          Show HUD by default
        </label>
        <label>
          Default mode
          <select id="defaultMode"></select>
        </label>
        <p id="modeDescription" class="note"></p>
        <label id="scaleField">
          Default scale
          <select id="defaultScale"></select>
        </label>
        <fieldset id="frameGenerationField">
          <legend>Frame Generation</legend>
          <label class="checkbox">
            <input id="frameGenerationEnabled" type="checkbox" />
            Target higher output FPS
          </label>
          <label id="frameGenerationTargetField">
            Target
            <select id="frameGenerationTarget"></select>
          </label>
          <p class="note">Experimental frame pacing. True optical-flow frame generation is still on the roadmap.</p>
        </fieldset>
        <label id="sharpnessField">
          <span id="sharpnessLabel">Sharpness</span>
          <input id="fsrSharpness" type="range" min="0" max="2" step="0.05" />
          <output id="sharpnessValue" for="fsrSharpness"></output>
        </label>
        <fieldset id="animeField" disabled>
          <legend>Anime4K Fast</legend>
          <label>
            Sub-mode
            <select id="animeSubMode">
              <option value="mode-a">Mode A</option>
              <option value="mode-aa">Mode A+A</option>
            </select>
          </label>
        </fieldset>
        <fieldset id="ravuField">
          <legend>RAVU</legend>
          <label>
            Variant
            <select id="ravuVariant">
              <option value="auto">Auto</option>
              <option value="zoom">RAVU-Zoom (pending)</option>
              <option value="lite">RAVU-Lite</option>
            </select>
          </label>
        </fieldset>
        <p id="supportNote" class="note"></p>
      </section>
      <section>
        <h2>Developer Panel</h2>
        <label class="checkbox"><input id="forceWebGL2" type="checkbox" /> Force WebGL2 only</label>
        <label class="checkbox"><input id="forceF32" type="checkbox" /> Force f32 shaders</label>
        <label>
          Workgroup size
          <select id="workgroupSize">
            <option value="8x8">8x8</option>
            <option value="16x16">16x16</option>
          </select>
        </label>
      </section>
      <footer>Copyright (c) 2026 Rajesh Peter D'Monte. MIT licensed.</footer>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
