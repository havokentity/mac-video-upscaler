<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mac Video Upscaler</title>
  </head>
  <body>
    <main class="panel">
      <header>
        <h1>Mac Video Upscaler</h1>
        <label class="switch">
          <input id="enabled" type="checkbox" />
          <span>Enabled</span>
        </label>
      </header>

      <label class="checkbox">
        <input id="hudEnabled" type="checkbox" />
        Show HUD
      </label>

      <label>
        Mode
        <select id="mode"></select>
      </label>

      <p id="modeNote" class="note"></p>

      <label id="scaleField">
        Scale
        <select id="scale"></select>
      </label>

      <fieldset id="frameGenerationField">
        <legend>Frame Generation</legend>
        <label class="checkbox">
          <input id="frameGenerationEnabled" type="checkbox" />
          Target higher output FPS
        </label>
        <label id="frameGenerationTargetField">
          Target
          <select id="frameGenerationTarget"></select>
        </label>
        <p class="note">Experimental frame pacing. It repeats/interpolates presentation timing only; optical-flow motion generation is planned later.</p>
      </fieldset>

      <label id="sharpnessField">
        <span id="sharpnessLabel">Sharpness</span>
        <input id="fsrSharpness" type="range" min="0" max="2" step="0.05" />
        <output id="sharpnessValue" for="fsrSharpness"></output>
      </label>

      <fieldset id="animeField" disabled>
        <legend>Anime4K Fast</legend>
        <label>
          Sub-mode
          <select id="animeSubMode">
            <option value="mode-a">Mode A</option>
            <option value="mode-aa">Mode A+A</option>
          </select>
        </label>
      </fieldset>

      <fieldset id="ravuField" disabled>
        <legend>RAVU</legend>
        <label>
          Variant
          <select id="ravuVariant">
            <option value="auto">Auto</option>
            <option value="zoom">RAVU-Zoom</option>
            <option value="lite">RAVU-Lite</option>
          </select>
        </label>
        <p class="note">Neural-Pro is opt-in once the LGPL shader port lands.</p>
      </fieldset>

      <p id="supportNote" class="note"></p>
      <footer>Copyright (c) 2026 Rajesh Peter D'Monte. MIT licensed.</footer>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
